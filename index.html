<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <title>Мій перший сайт</title>
    <meta name="description" content="Вивчення основ HTML5 для новачків" />
  </head>

  <body>
    <!-- Заголовок сторінки -->
    <h1>Привіт, це мій сайт</h1>

    <!-- Абзац тексту -->
    <p>Це звичайний абзац тексту.</p>

    <!-- Посилання (перехід на інший сайт) -->
    <a href="https://google.com" target="_blank"> Перейти в Google </a>

    <br /><br />

    <!-- Кнопка (нічого не відкриває, просто дія через JS або майбутню логіку) -->
    <button type="button">Натисни мене</button>

    <br /><br />

    <!-- Зображення -->
    <img
      src="https://picsum.photos/id/237/200/300"
      alt="Випадкове зображення"
    />

    <!-- Список -->
    <h2>Мій список</h2>
    <ul>
      <li>Перший пункт</li>
      <li>Другий пункт</li>
      <li>Третій пункт</li>
    </ul>
  </body>
</html>
